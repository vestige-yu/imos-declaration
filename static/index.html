<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IMOS 报关单生成</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="shell">
    <section class="workspace">
      <header class="topbar">
        <div>
          <p class="eyebrow">IMOS Customs Declaration</p>
          <h1>报关单生成</h1>
        </div>
        <span class="status" id="status">等待上传</span>
      </header>

      <section class="panel upload-panel">
        <form id="uploadForm">
          <label class="file-drop">
            <span>Invoice + Packing list</span>
            <strong id="documentsName">一次选择两个文件</strong>
            <input id="documents" name="documents" type="file" accept=".xls,.xlsx" multiple required>
          </label>
          <button class="primary" type="submit">解析并预览</button>
        </form>
      </section>

      <section class="summary-grid" id="summary" hidden>
        <div class="metric">
          <span>合同号</span>
          <strong data-field="contractNo">-</strong>
        </div>
        <div class="metric">
          <span>件数</span>
          <strong data-field="packageCount">-</strong>
        </div>
        <div class="metric">
          <span>毛重</span>
          <strong data-field="grossWeight">-</strong>
        </div>
        <div class="metric">
          <span>净重</span>
          <strong data-field="netWeight">-</strong>
        </div>
        <div class="metric">
          <span>总数量</span>
          <strong data-field="totalQuantity">-</strong>
        </div>
        <div class="metric">
          <span>总金额</span>
          <strong data-field="totalAmount">-</strong>
        </div>
      </section>

      <section class="panel" id="previewPanel" hidden>
        <div class="panel-title">
          <h2>预览</h2>
          <button class="primary" id="generateBtn" type="button">生成并下载</button>
        </div>
        <div class="details">
          <div><span>境外收货人</span><strong id="consignee">-</strong></div>
          <div><span>成交方式</span><strong id="tradeTerm">-</strong></div>
          <div><span>币制</span><strong id="currency">-</strong></div>
        </div>
        <div class="warnings" id="warnings" hidden></div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>项号</th>
                <th>HS Code</th>
                <th>商品名称</th>
                <th>品牌</th>
                <th>数量</th>
                <th>净重</th>
                <th>金额</th>
                <th>币制</th>
              </tr>
            </thead>
            <tbody id="lines"></tbody>
          </table>
        </div>
      </section>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
